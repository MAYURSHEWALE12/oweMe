server:
  port: 8080

spring:
  application:
    name: okcredit-backend

  datasource:
    url: jdbc:h2:mem:okcredit;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true

  h2:
    console:
      enabled: true
      path: /h2-console

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: UTC

  mail:
    host: smtp-relay.brevo.com
    port: 587
    username: ${BREVO_USERNAME}
    password: ${BREVO_PASSWORD}
    properties:
      mail:
        from: 10ninjagod@gmail.com
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

app:
  jwt:
    secret: ${JWT_SECRET:CRnm8dGMX8/H+V5fyJ5bAH1FUdwzAUND5ltZ4hYqR4Y=}
    expiration: 86400000
    refresh-expiration: 604800000

  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:3000,http://localhost:5173}

logging:
  level:
    com.okcredit: DEBUG
    org.springframework.security: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [thread] %-5level %logger{36} - %msg%n"

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
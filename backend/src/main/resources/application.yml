server:
  port: 8080

spring:
  application:
    name: okcredit-backend

  datasource:
    url: ${DB_URL:jdbc:h2:mem:okcredit;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}
    driver-class-name: ${DB_DRIVER_CLASS_NAME:org.h2.Driver}

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: ${DB_DIALECT:org.hibernate.dialect.MySQLDialect}
        format_sql: true

  h2:
    console:
      enabled: true
      path: /h2-console

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: UTC

  mail:
    host: smtp-relay.brevo.com
    port: 2525
    username: ${BREVO_USERNAME}
    password: ${BREVO_PASSWORD}
    properties:
      mail:
        from: 10ninjagod@gmail.com
        smtp:
          auth: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000
          starttls:
            enable: true
            required: true

app:
  jwt:
    secret: ${JWT_SECRET:CRnm8dGMX8/H+V5fyJ5bAH1FUdwzAUND5ltZ4hYqR4Y=}
    expiration: 86400000
    refresh-expiration: 604800000

  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:3000,http://localhost:5173}

logging:
  level:
    com.okcredit: DEBUG
    org.springframework.security: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [thread] %-5level %logger{36} - %msg%n"

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
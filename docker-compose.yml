version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: okcredit-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: okcredit
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  backend:
    build: ./backend
    container_name: okcredit-backend
    environment:
      DB_URL: jdbc:mysql://mysql:3306/okcredit?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      DB_USERNAME: root
      DB_PASSWORD: root
      JWT_SECRET: OkCreditSecretKeyForJWTTokenGeneration2024SecureAndLongEnough
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: okcredit-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  mysql_data: